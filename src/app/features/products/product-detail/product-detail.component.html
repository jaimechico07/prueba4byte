<div class="detail-container">
  <p-toast
    position="top-right"
    [breakpoints]="{ '920px': { width: '90%', right: '5%' } }"
  ></p-toast>

  <div class="back-button">
    <p-button
      label="Back to Products"
      icon="pi pi-arrow-left"
      [routerLink]="['/products']"
      styleClass="p-button-text p-button-info"
    ></p-button>
  </div>

  @if (loading()) {
    <div class="loading-container">
      <p-progressSpinner></p-progressSpinner>
    </div>
  } @else if (product()) {
    <div class="product-detail">
      <div class="image-container">
        <img
          [src]="product()!.image"
          [alt]="product()!.title"
          class="product-image"
          (error)="handleImageError($event)"
        />
      </div>

      <div class="info-container">
        <h1>{{ product()!.title }}</h1>

        <div class="category">
          <p-chip [label]="product()!.category"></p-chip>
        </div>

        <div class="price">
          <h2>{{ product()!.price | currency: 'USD' }}</h2>
        </div>

        <div class="description">
          <h3>Description</h3>
          <p>{{ product()!.description }}</p>
        </div>

        @if (product()!.rating) {
          <div class="rating">
            <h3>Rating</h3>
            <div class="stars">
              <i class="pi pi-star-fill" style="color: yellow"></i> {{ product()!.rating!.rate }} /
              5 ({{ product()!.rating!.count }}
              reviews)
            </div>
          </div>
        }
      </div>
    </div>
  }
</div>
